app = "locato-quest"
primary_region = "ams"

[env]
  NODE_ENV = "production"
  ROOM_TTL_SECONDS = "7200"
  MAX_PLAYERS_PER_ROOM = "8"
  MAX_ROOMS = "500"
  ANSWER_RATE_LIMIT_PER_SECOND = "5"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
