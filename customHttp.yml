customHeaders:
  - pattern: "**/*.svg"
    headers:
      - key: Cache-Control
        value: "public, max-age=31536000, immutable"
  - pattern: "**/*.css"
    headers:
      - key: Cache-Control
        value: "public, max-age=3600"
  - pattern: "**/*.js"
    headers:
      - key: Cache-Control
        value: "public, max-age=3600"
  - pattern: "index.html"
    headers:
      - key: Cache-Control
        value: "public, max-age=0, must-revalidate"
